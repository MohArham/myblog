<!DOCTYPE html>
<html>
    <head>
        <title>Calculator</title>
        <link rel="stylesheet" href="../css/calculator.css">
    </head>
    <body>
        <div class="calc">
            <div class="display">
                <h1 id="num-display"></h1>
                
            </div>

            <div class="buttons">
                <!--different types of operator symbols-->
                <button class="more-opr-btn btn" onclick="eraseDigits()">AC</button>
                <button class="more-opr-btn btn">+/-</button>
                <button class="more-opr-btn btn">%</button>

                <!--Number buttons-->
                <button class="num-btn btn num-1" onclick="displayDigit(1)">1</button>
                <button class="num-btn btn num-2" onclick="displayDigit(2)">2</button>
                <button class="num-btn btn num-3" onclick="displayDigit(3)">3</button>
                <button class="num-btn btn num-4" onclick="displayDigit(4)">4</button>
                <button class="num-btn btn num-5" onclick="displayDigit(5)">5</button>
                <button class="num-btn btn num-6" onclick="displayDigit(6)">6</button>
                <button class="num-btn btn num-7" onclick="displayDigit(7)">7</button>
                <button class="num-btn btn num-8" onclick="displayDigit(8)">8</button>
                <button class="num-btn btn num-9" onclick="displayDigit(9)">9</button>
                <button class="num-0" onclick="displayDigit(0)">0</button>
                <button class="num-btn btn">.</button>

                <!--Operator buttons-->
                <button class="opr-btn opr-1 black-btns btn" onclick="backSpace()">⌫</button>
                <button class="opr-btn opr-2 btn" onclick="multiplyDigits()">x</button>
                <button class="opr-btn opr-3 btn" onclick="minusDigits()">-</button>
                <button class="opr-btn opr-4 btn" onclick="addDigits()">+</button>
                <button class="opr-btn  opr-6 btn" onclick="divideDigits()">÷</button>
                <button class="opr-btn opr-5 black-btns btn" onclick="solveEquation()">=</button>

            </div> <!--end of the button's div-->
        </div><!--end of the calc div-->

        <script>
            let displayEl = document.querySelector("#num-display");
            let displayBox = document.querySelector(".display");
            displayEl.style.fontSize = "64px";
            let justCalculated = false
            let opAfterCalc = false

            function getOperator(equation) {
                if (equation.includes("+")) {
                    return "+"
                } else if (equation.includes("-")) {
                    return "-"
                } else if (equation.includes("x")) {
                    return "x"
                } else if (equation.includes("÷")) {
                    return "÷"
                }
            }

            function displayDigit(value) {
                if (justCalculated) {
                    eraseDigits()
                    justCalculated = false
                }
                displayEl.innerText += value;
                resizeDigits()
            }

            function eraseDigits() {
                displayEl.textContent = "";
            }

            function backSpace() {
                if (justCalculated) {
                    eraseDigits();
                    justCalculated = false;
                    return;
                } 
                displayEl.innerText = displayEl.innerText.slice(0, -1);

                resizeDigits()
            }
            
            function multiplyDigits() { displayEl.innerText += "x";}
            function minusDigits() {displayEl.innerText += "-";}
            function addDigits() {displayEl.innerText += "+";}
            function divideDigits() {displayEl.innerText += "÷"}

            function solveEquation() {

            let equation = displayEl.textContent;
            justCalculated = false
            let operator = getOperator(equation);
            let equationParts = equation.split(operator);
            let firstNum = equationParts[0];
            let secondNum = equationParts[1];
            let result;

                if (operator === "+") {
                    result = Number(firstNum) + Number(secondNum);
                    displayEl.innerText = result
                } else if (operator === "-") {
                    result = Number(firstNum) - Number(secondNum);
                    displayEl.innerText = result
                } else if (operator === "x") {
                    result = Number(firstNum) * Number(secondNum);
                    displayEl.innerText = result
                } else if (operator === "÷") {
                    result = Number(firstNum) / Number(secondNum);
                    displayEl.innerText = result
                } 

                 justCalculated = true

            }

            function resizeDigits() {
                let currentSize = Number(displayEl.style.fontSize.replace("px", ""));

                if (displayEl.scrollWidth > displayBox.clientWidth) {
                    displayEl.style.fontSize = (currentSize - 5) + "px";
                }

                if (displayEl.scrollWidth < displayBox.clientWidth - 50 && currentSize < 64) {
                    displayEl.style.fontSize = (currentSize + 5) + "px";
                }
            }
        </script>
    </body>
</html>
