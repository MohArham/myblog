<!DOCTYPE html>
<html>
    <head>
        <title>tables </title>
    </head>
    <style>
        table {
    background-color: white;
    border-collapse: collapse;
    margin: auto;
    border-radius: 20px;
    overflow: hidden;
    box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
}

h1 {
    text-align: center;
}

body {
    background: linear-gradient(to right, red, rgb(2, 239, 239));
    font-family: Arial, sans-serif;
}

th {
    background-color: lightgray;
    font-size: 20px;
}

td {
    font-size: 15px;
}
tr, th, td {
    border: 2px black solid;
    padding: 10px;
}
    </style>
    <body>
        <h1>Leaderboard</h1>
        <table>
            <thead>
                <tr>
                    <th>Username</th>
                    <th>Time</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>Arham@67ULTRA</td>
                    <td>30secs</td>
                </tr>
                <tr>
                    <td>fakhr#BROCODE</td>
                    <td>38secs</td>
                </tr>
                <tr>
                    <td>UltraMustashe</td>
                    <td>43secs</td>
                </tr>
            </tbody>
        </table>
    </body>
</html>
